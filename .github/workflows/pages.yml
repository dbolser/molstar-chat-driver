name: Deploy preview site

# Builds site/ and publishes it to GitHub Pages. Enable Pages with source "GitHub Actions"
# in repo Settings → Pages. The site talks to your Supabase Edge Functions (see SETUP.md).
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'esbuild.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
