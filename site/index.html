<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mol* chat — preview</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@5.10.1/build/viewer/molstar.css" />
    <script src="https://cdn.jsdelivr.net/npm/molstar@5.10.1/build/viewer/molstar.js"></script>
    <!-- Public Supabase config (project URL + anon key). Edit config.js with your values. -->
    <script src="./config.js"></script>
    <style>
      html, body { height: 100%; margin: 0; }
      body { min-height: 100%; display: flex; flex-direction: column; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      #banner { padding: 6px 12px; background: #fff7e6; border-bottom: 1px solid #ffe2a8; color: #7a5b00; font-size: 13px; }
      #app { display: flex; flex: 1; min-height: 0; }
      #viewer { position: relative; flex: 1; min-width: 0; }
      #side { flex: 0 0 420px; display: flex; flex-direction: column; border-left: 1px solid #e0e0e0; }
      #chat { flex: 1; min-height: 0; }
      #feedback { border-top: 1px solid #e0e0e0; padding: 10px 12px; background: #fafafa; }
      #feedback textarea { width: 100%; box-sizing: border-box; min-height: 52px; resize: vertical; border: 1px solid #d0d0d0; border-radius: 6px; padding: 8px; font: inherit; }
      #feedback .row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
      #feedback button { cursor: pointer; border: 1px solid #d0d0d0; background: #fff; border-radius: 6px; padding: 6px 14px; font: inherit; }
      #feedback .sent { color: #1a7f37; font-size: 12px; }
      #gate { position: fixed; inset: 0; background: rgba(255,255,255,.96); display: flex; align-items: center; justify-content: center; z-index: 10; }
      #gate .card { text-align: center; max-width: 360px; }
      #gate input { font: inherit; padding: 8px; border: 1px solid #ccc; border-radius: 6px; width: 220px; }
      #gate button { font: inherit; padding: 8px 16px; border: none; background: #1a66ff; color: #fff; border-radius: 6px; cursor: pointer; margin-left: 6px; }
      #gate button[disabled] { opacity: .5; cursor: default; }
      #gate-error { color: #b3261e; font-size: 13px; min-height: 18px; margin-top: 8px; }
      #gate code { background: #eef; padding: 1px 4px; border-radius: 4px; }
      @media (max-width: 820px) {
        #app { flex-direction: column; }
        #viewer { flex: 1 1 50%; }
        #side { flex: 1 1 50%; border-left: none; border-top: 1px solid #e0e0e0; }
      }
    </style>
  </head>
  <body>
    <div id="banner">● Preview — your prompts and feedback are being recorded to help build an open benchmark. Please keep this link private.</div>
    <div id="app">
      <div id="viewer"></div>
      <div id="side">
        <div id="chat"></div>
        <div id="feedback"></div>
      </div>
    </div>
    <div id="gate">
      <div class="card">
        <h2>Mol* chat — preview</h2>
        <p>Thanks for helping! Pop your name in so we can credit your feedback.</p>
        <div>
          <input id="gate-name" placeholder="Your name" autocomplete="name" />
          <button id="gate-go">Start</button>
        </div>
        <div id="gate-error"></div>
      </div>
    </div>
    <script type="module" src="./dist/site.js"></script>
  </body>
</html>
